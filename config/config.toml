# ==========================================
# OmniTrade AI 交易系统配置文件
# ==========================================

[global]
# 演示模式开关
demo_mode = true

# 日志级别: DEBUG, INFO, WARNING, ERROR
log_level = "INFO"

# 日志文件存放目录
log_dir = "./logs"

# 最大分析历史记录长度
max_analysis_history_length = 20

# K线数据获取数量
k_line_count = 150

# 使用的大语言模型名称
llm_model = "qwen/qwen3.5-flash-02-23"

# 交易记录保存路径
trade_record_path = "./trade_records.csv"

# 交易模式: isolated(逐仓) / cross(全仓)
td_mode = "cross"

# 单笔风险百分比 (1% = 0.01)
# 交易员Agent根据分析师给出的方向、止损，结合当前价格、账户余额来计算开仓数量
# 计算公式: 开仓数量 = (账户余额 × 单笔风险百分比) ÷ |当前价格 - 止损价格| × 当前价格
risk_per_trade = 0.01

# ==========================================
# 交易对配置 (可配置多个交易对)
# ==========================================

[[trade_pairs]]
# 交易对标识: BTC-USDT-SWAP 表示 BTC 永续合约
inst_id = "BTC-USDT-SWAP"

# 时间周期: 1H(1小时), 4H(4小时), 1D(日线) 等
timeframe = "1H"

# 杠杆倍数
leverage = 10

# 仓位大小 (USDT)
position_size = 100

# 止损比例 (2% = 0.02)
stop_loss_ratio = 0.02

# 止盈比例 (5% = 0.05)
take_profit_ratio = 0.05

[[trade_pairs]]
# 交易对标识: ETH-USDT-SWAP 表示 ETH 永续合约
inst_id = "ETH-USDT-SWAP"

# 时间周期
timeframe = "4H"

# 杠杆倍数
leverage = 20

# 仓位大小 (USDT)
position_size = 50

# 止损比例 (3% = 0.03)
stop_loss_ratio = 0.03

# 止盈比例 (8% = 0.08)
take_profit_ratio = 0.08
